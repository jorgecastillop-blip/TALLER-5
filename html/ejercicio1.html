<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Tabla de horario de conferencias">

<body>
     <script>
 
        
        function crearCelda(tipo, texto, colspan, rowspan) {
            var celda = crearElemento(tipo)
            if (texto) {
                var textoNodo = document.createTextNode(texto)
                celda.appendChild(textoNodo)
            }
            if (colspan) celda.colSpan = colspan
            if (rowspan) celda.rowSpan = rowspan
            return celda
        }
 
        
        function crearFila() {
            var fila = crearElemento('tr')
            return fila
        }
 
        
        var tabla = crearElemento('table')
        tabla.border = "1"
        tabla.cellPadding = "10"
        tabla.cellSpacing = "0"
        tabla.width = "100%"
 
        
        var filaEncabezado = crearFila()
        adicionarElementoAContenedor(crearCelda('th', 'Día'), filaEncabezado)
        adicionarElementoAContenedor(crearCelda('th', '8:00 - 9:00'), filaEncabezado)
        adicionarElementoAContenedor(crearCelda('th', '9:00 - 10:00'), filaEncabezado)
        adicionarElementoAContenedor(crearCelda('th', '10:00 - 11:00'), filaEncabezado)

        adicionarElementoAContenedor(crearCelda('th', '13:00 - 14:00'), filaEncabezado)
        adicionarElementoAContenedor(crearCelda('th', '14:00 - 15:00'), filaEncabezado)
        adicionarElementoAContenedor(filaEncabezado, tabla)

        adicionarElementoAContenedor(crearCelda('td', 'Taller Final', 2), filaMiercoles2)
